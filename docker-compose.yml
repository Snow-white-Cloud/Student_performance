version: '3.9'

services:
  db:
    image: postgres:15
    container_name: database
    env_file:
      - db.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: web
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - db.env
  
  tests:
    build: .
    container_name: tests
    command: ["pytest"]
    env_file:
      - db.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app 

volumes:
  postgres_data:


